apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: fraud-mlops
data:
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: fraud-detection
        orgId: 1
        folder: Fraud Detection
        type: file
        disableDeletion: false
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
