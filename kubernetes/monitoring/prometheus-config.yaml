apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: fraud-mlops
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: "fraud-detection-api"
        metrics_path: /metrics
        static_configs:
          - targets:
              - "fraud-detection-service:8000"
